name: Desplegar a GitHub Pages

# Compila la PWA y la publica en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

# Permisos que necesita el deploy de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues pisándose; deja terminar el que está en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar íconos PWA
        run: node scripts/generar-iconos.mjs

      - name: Compilar
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
